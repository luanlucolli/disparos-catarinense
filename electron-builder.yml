appId: com.electron.app
productName: Disparos Catarinense
directories:
  # Pasta onde o builder buscará o icon.ico e icon.icns automaticamente
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: disparos-catarinense
  # Garante que o ícone seja aplicado ao executável Windows
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  # Ícone que aparece no instalador .exe
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
mac:
  icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
  notarize: false
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: disparos-catarinense.com.br
  category: Utility
publish:
  provider: generic
  url: https://example.com/auto-updates